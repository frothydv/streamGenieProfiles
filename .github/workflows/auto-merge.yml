name: Auto-merge trusted submissions

on:
  # Bot-opened PRs: auto-merge immediately (bot account is the profile owner)
  pull_request:
    types: [opened]
  # Community PRs: auto-merge once a profile owner approves
  pull_request_review:
    types: [submitted]

jobs:
  auto-merge-bot-pr:
    name: Auto-merge bot PR
    # The bot account (frothydv) opens PRs on behalf of users. It owns all
    # profiles initially, so its PRs are trusted and merge immediately.
    # When a profile changes hands, remove that owner's profiles from this
    # condition and let the review-based path handle them instead.
    if: |
      github.event_name == 'pull_request' &&
      github.event.pull_request.user.login == 'frothydv'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Merge PR
        run: |
          gh pr merge "${{ github.event.pull_request.number }}" \
            --merge \
            --repo "${{ github.repository }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  auto-merge-on-approval:
    name: Auto-merge on CODEOWNER approval
    # When any collaborator approves a PR, merge it. Real CODEOWNER enforcement
    # (i.e. only the *right* owner can approve) requires branch protection rules
    # set in GitHub repository settings — configure "Require review from Code
    # Owners" there to prevent unauthorised approvals from triggering this.
    if: |
      github.event_name == 'pull_request_review' &&
      github.event.review.state == 'approved'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Merge PR
        run: |
          gh pr merge "${{ github.event.pull_request.number }}" \
            --merge \
            --repo "${{ github.repository }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
