name: Auto-merge trusted submissions

on:
  # Auto-merge once a profile owner approves a community PR.
  # Trusted contributors commit directly via the worker (no PR needed),
  # so every PR here is a community submission requiring review first.
  pull_request_review:
    types: [submitted]

jobs:
  auto-merge-on-approval:
    name: Auto-merge on CODEOWNER approval
    if: |
      github.event_name == 'pull_request_review' &&
      github.event.review.state == 'approved'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Merge PR (squash)
        id: merge
        continue-on-error: true
        run: |
          gh pr merge "${{ github.event.pull_request.number }}" \
            --squash \
            --delete-branch \
            --repo "${{ github.repository }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Comment on conflict
        if: steps.merge.outcome == 'failure'
        run: |
          gh pr comment "${{ github.event.pull_request.number }}" \
            --body "⚠️ Auto-merge failed (likely a merge conflict). Please resolve and merge manually." \
            --repo "${{ github.repository }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
